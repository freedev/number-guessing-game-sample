plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

testing {
    suites {
        test {
            useJUnitJupiter('6.0.1')
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'com.workshop.game.App'
}

tasks.named('run', JavaExec) {
    standardInput = System.in
}
